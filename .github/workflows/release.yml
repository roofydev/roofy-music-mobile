name: Release
on:
  push:
    branches:
      - "main"
    paths:
      - "app/build.gradle.kts"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    if: "!contains(github.ref, 'refs/tags')"
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check_version.outputs.version_changed }}
      new_version: ${{ steps.check_version.outputs.new_version }}
      version_code: ${{ steps.check_version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check_version
        run: |
          NEW_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "")
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts || echo "")

          if [ -z "$NEW_VERSION" ]; then
            echo "version_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Always export the current version so workflow_dispatch has it
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

          if git show HEAD^:app/build.gradle.kts > /dev/null 2>&1; then
            OLD_VERSION=$(git show HEAD^:app/build.gradle.kts | grep -oP 'versionName\s*=\s*"\K[^"]+' || echo "")
            if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
              echo "version_changed=true" >> $GITHUB_OUTPUT
            else
              echo "version_changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "version_changed=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew --console=plain clean assembleGmsRelease --warning-mode summary
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Check signing secrets
        run: |
          missing=0
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::Missing KEYSTORE or ANDROID_SIGNING_KEY repository secret."
            missing=1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::Missing KEY_ALIAS repository secret."
            missing=1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::error::Missing KEYSTORE_PASSWORD repository secret."
            missing=1
          fi
          if [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Missing KEY_PASSWORD repository secret."
            missing=1
          fi
          exit "$missing"
        env:
          SIGNING_KEY: ${{ secrets.KEYSTORE || secrets.ANDROID_SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: app/build/outputs/apk/gms/release/
          signingKey: ${{ secrets.KEYSTORE || secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename signed APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/gms/release"
          mkdir -p "$OUTPUT_DIR/out"
          SIGNED_APK=$(find "$OUTPUT_DIR" -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | head -1)
          mv "$SIGNED_APK" "$OUTPUT_DIR/out/roofy-music.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: roofy-music
          path: app/build/outputs/apk/gms/release/out/roofy-music.apk

  create-release:
    needs: [check-version, build]
    if: needs.check-version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v7
        with:
          name: roofy-music
          path: release_files/

      - name: Parse release notes
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          chmod +x .github/scripts/parse_changelog.sh
          if bash .github/scripts/parse_changelog.sh "$VERSION" changelog.md > release_notes.md; then
            echo "Release notes sourced from changelog.md"
          else
            {
              echo "Release of version $VERSION"
              echo ""
              git log "$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")..HEAD" \
                --pretty=format:"- %s" --no-merges | head -10 || echo "- Initial release"
            } > release_notes.md
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          gh release create "v${{ needs.check-version.outputs.new_version }}" \
            --title "Roofy Music ${{ needs.check-version.outputs.new_version }}" \
            --notes-file release_notes.md \
            --latest \
            release_files/roofy-music.apk
