name: Release
on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.resolve_version.outputs.release_version }}
      version_code: ${{ steps.resolve_version.outputs.version_code }}
      release_sha: ${{ steps.commit_version.outputs.release_sha || github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: resolve_version
        run: |
          CURRENT_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          NEW_VERSION="$CURRENT_VERSION"

          while git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; do
            NEW_VERSION=$(echo "$NEW_VERSION" | awk -F. '{
              if (NF >= 3) { print $1"."$2"."$3+1 }
              else if (NF == 2) { print $1"."$2".1" }
              else { print $1".0.1" }
            }')
          done

          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionCode\s*=\s*[0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName\s*=\s*\"[^\"]*\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts

          echo "release_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Releasing v$NEW_VERSION (versionCode $VERSION_CODE)"

      - name: Commit version bump
        id: commit_version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          if git diff --staged --quiet; then
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): bump to v${{ steps.resolve_version.outputs.release_version }} [skip ci]"
          git push
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew --console=plain clean assembleGmsRelease --warning-mode summary
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Check signing secrets
        run: |
          missing=0
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::Missing KEYSTORE or ANDROID_SIGNING_KEY repository secret."
            missing=1
          fi
          if [ -z "$KEY_ALIAS" ]; then
            echo "::error::Missing KEY_ALIAS repository secret."
            missing=1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::error::Missing KEYSTORE_PASSWORD repository secret."
            missing=1
          fi
          if [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Missing KEY_PASSWORD repository secret."
            missing=1
          fi
          exit "$missing"
        env:
          SIGNING_KEY: ${{ secrets.KEYSTORE || secrets.ANDROID_SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign APK
        uses: ilharp/sign-android-release@v2.0.0
        with:
          releaseDir: app/build/outputs/apk/gms/release/
          signingKey: ${{ secrets.KEYSTORE || secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename signed APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/gms/release"
          mkdir -p "$OUTPUT_DIR/out"
          SIGNED_APK=$(find "$OUTPUT_DIR" -name "*-signed.apk" -o -name "*-unsigned-signed.apk" | head -1)
          mv "$SIGNED_APK" "$OUTPUT_DIR/out/roofy-music.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: roofy-music
          path: app/build/outputs/apk/gms/release/out/roofy-music.apk

  create-release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v7
        with:
          name: roofy-music
          path: release_files/

      - name: Parse release notes
        run: |
          VERSION="${{ needs.prepare.outputs.release_version }}"
          chmod +x .github/scripts/parse_changelog.sh
          if bash .github/scripts/parse_changelog.sh "$VERSION" changelog.md > release_notes.md; then
            echo "Release notes sourced from changelog.md"
          else
            {
              echo "## Roofy Music $VERSION"
              echo ""
              echo "### Changes since last release"
              echo ""
              PREV_TAG=$(git describe --tags --abbrev=0 "${{ needs.prepare.outputs.release_sha }}^" 2>/dev/null || echo "")
              if [ -n "$PREV_TAG" ]; then
                git log "${PREV_TAG}..${{ needs.prepare.outputs.release_sha }}" \
                  --pretty=format:"- %s (%h)" --no-merges | head -20
              else
                git log -20 "${{ needs.prepare.outputs.release_sha }}" \
                  --pretty=format:"- %s (%h)" --no-merges
              fi
            } > release_notes.md
          fi

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          VERSION="${{ needs.prepare.outputs.release_version }}"
          TAG="v${VERSION}"
          SHA="${{ needs.prepare.outputs.release_sha }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi

          git tag -a "$TAG" "$SHA" -m "Roofy Music $VERSION"
          git push origin "$TAG"

          gh release create "$TAG" \
            --target "$SHA" \
            --title "Roofy Music $VERSION" \
            --notes-file release_notes.md \
            --latest \
            release_files/roofy-music.apk
